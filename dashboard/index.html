<!DOCTYPE html>
<html>
<head>

<title>AI Content Factory</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

button{
padding:15px 25px;
margin:15px;
font-size:16px;
border:none;
background:#1e90ff;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#0f6edc;
}

</style>

</head>

<body>

<h1>AI Marketing Automation Dashboard</h1>

<p>SafetyBeyondRules Content System</p>

<button onclick="runAutomation()">Run Full Automation</button>

<button onclick="runBlog()">Generate Blog Article</button>

<button onclick="runLinkedin()">Generate LinkedIn Post</button>

<button onclick="runYoutube()">Generate YouTube Content</button>

<p id="status"></p>

<script>

function runAutomation(){
document.getElementById("status").innerText="Automation triggered in GitHub";
}

function runBlog(){
document.getElementById("status").innerText="Blog generator started";
}

function runLinkedin(){
document.getElementById("status").innerText="LinkedIn post generator started";
}

function runYoutube(){
document.getElementById("status").innerText="YouTube generator started";
}

</script>

</body>

</html>
