<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Marketing Dashboard</title>
<style>
  body { font-family: Arial; padding: 20px; background: #f4f4f9; }
  h1 { color: #333; }
  .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 10px; background: #fff; }
  button { padding: 10px 20px; margin-top: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
  pre { background: #f0f0f0; padding: 10px; border-radius: 5px; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>
<h1>AI Marketing Dashboard</h1>

<div class="section">
  <h2>Generate Blog Post</h2>
  <button onclick="runContentGenerator()">Generate</button>
  <pre id="contentOutput"></pre>
</div>

<div class="section">
  <h2>Run Social Media Scripts</h2>
  <button onclick="runSocialMedia()">Run</button>
  <pre id="socialOutput"></pre>
</div>

<script>
const BACKEND_URL = 'https://your-backend-url.onrender.com'; // Replace with your Render backend URL

function runContentGenerator() {
    const output = document.getElementById('contentOutput');
    output.textContent = 'Generating blog post...';
    
    fetch(`${BACKEND_URL}/run-content-generator`)
        .then(res => res.text())
        .then(data => output.textContent = data)
        .catch(err => output.textContent = 'Error: ' + err);
}

function runSocialMedia() {
    const output = document.getElementById('socialOutput');
    output.textContent = 'Running social media scripts...';
    
    fetch(`${BACKEND_URL}/run-social-media`)
        .then(res => res.text())
        .then(data => output.textContent = data)
        .catch(err => output.textContent = 'Error: ' + err);
}
</script>
</body>
</html>
