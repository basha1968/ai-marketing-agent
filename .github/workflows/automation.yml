name: AI Marketing Agent

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Show Repository Files
        run: ls -R

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client oauth2client

      - name: Generate Blog Article
        run: python content_generator.py

      - name: Generate LinkedIn Post
        run: python linkedin_post.py

      - name: Generate YouTube Description
        run: python youtube_description.py

      - name: Publish Blog to Blogger
        run: python publish_blogger.py
