name: AI Marketing Agent

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run-agent:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Generate Blog Article
        run: python content_generator.py

      - name: Generate LinkedIn Post
        run: python linkedin_post.py

      - name: Generate YouTube Content
        run: python youtube_description.py

      - name: Publish Blog
        run: python publish_blogger.py
